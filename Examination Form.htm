<!DOCTYPE html>
<html>
<head>
    <title>Examination Form</title>
</head>
<body style="background-color:powderblue">
    <h1>Examination Form</h1>
    <form action method="post">
        <label for="student_name">Student Name:</label><br>
        <input type="text"  name="student_name"><br>
        <label for="student_id">Student ID:</label><br>
        <input type="text"  name="student_id"><br>
        <label for="exam_name">Exam Name:</label><br>
        <input type="text"  name="exam_name"><br>
        <label for="exam_date">Exam Date:</label><br>
        <input type="date"  name="exam_date"><br>
        
        <!-- Question 1 -->
        <h2>Question 1</h2>
        <label for="q1">What is the capital of France?</label><br>
        <input type="radio" id="q1_a" name="q1" value="Paris">
        <label for="q1_a">Paris</label><br>
        <input type="radio" id="q1_b" name="q1" value="London">
        <label for="q1_b">London</label><br>
        <input type="radio" id="q1_c" name="q1" value="Berlin">
        <label for="q1_c">Berlin</label><br>
        
        <!-- Question 2 -->
        <h2>Question 2</h2>
        <label for="q2">What is the largest planet in our solar system?</label><br>
        <input type="radio" id="q2_a" name="q2" value="Earth">
        <label for="q2_a">Earth</label><br>
        <input type="radio" id="q2_b" name="q2" value="Saturn">
        <label for="q2_b">Saturn</label><br>
        <input type="radio" id="q2_c" name="q2" value="Jupiter">
        <label for="q2_c">Jupiter</label><br>
        
        <!-- Add more questions here -->
        
        <input type="submit" value="Submit Exam">
    </form>
</body>
</html>
