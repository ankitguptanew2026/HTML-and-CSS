<!doctype html>
<html>
<head>
<title>STUDENT REGISTRATION FORM</title>
</head>
<body>
<h1>Student Registration</h1>
<form method="post">
<table border="1" cellspacing="0">
<tr>
<td><label>Username</label></td>
<td><input type="text" name="uname" placeholder="Enter Name Here"/></td>
</tr>
<tr>
<td><label>Password</label></td>
<td><input type="password" name="upass" placeholder="Enter Password here"/</td>
</tr>
<tr>
<td><input type="submit" name="usubmit" value="login"/></td>
<td><input type="reset" name="ureset" value="cancel"/></td>
</tr>
</table>
</form>
</body>
</html>
