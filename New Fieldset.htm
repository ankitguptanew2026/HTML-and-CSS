<!DOCTYPE html>
<html>
<head><title>The fieldset and legend</title></head>
<body>

<h1>The fieldset element</h1>

<form >
<div>
 <fieldset>
<legend>Personal Information</legend>
<div>
<legend>Salutation:</legend>
<select name="salutation">
<option value="Mr.">Mr.</option>
<option value="Mrs.">Mrs.</option>
<option value="Dear">Dear</option>
<div>
 <div> <legend>First Name:</legend>
  <input type="text"  name="fname" placeholder="First Name"></div>
<div>  
<legend>Middle Name</legend>
  <input type="text"  name="Mname" placeholder="Middle Name"></div>
<div>
<legend>Last Name</legend>
  <input type="text"  name="Lname" placeholder="Last Name"></div>
  <div><legend>Email:</legend>
  <input type="email"  name="email" placeholder="Email"></div><br><br>
  <div><legend>Birthday:</legend>
  <input type="date"  name="birthday"></div><br><br>


<br>
  <input type="submit" value="Submit">
 </fieldset>
</div>
</form>
</div>

</body>
</html>
